apiVersion: apps/v1
kind: Deployment

metadata:
  name: vishal-portfolio

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: vishal-portfolio
        imagePullPolicy: Never

        ports:
        - containerPort: 80